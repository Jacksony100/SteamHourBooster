<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Купить подписку</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
<div class="container text-center mt-5">
    <h1 class="mb-4">Купить подписку</h1>
    <form method="POST">
      <div class="mb-3">
          <label for="subscription_duration" class="form-label">Выберите период подписки:</label>
          <select class="form-select" id="subscription_duration" name="subscription_duration" required>
              <option value="">Выберите</option>
              <option value="1_week">1 Неделя (Test Period)</option>
              <option value="3_months">3 Месяца</option>
              <option value="6_months">6 Месяцев</option>
              <option value="12_months">12 Месяцев</option>
              <option value="lifetime">LifeTime</option>
          </select>
      </div>
      <button type="submit" class="btn btn-primary">Купить подписку</button>
    </form>
    <a href="/" class="btn btn-secondary mt-3">На главную</a>
</div>
</body>
</html>
